<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Alumno Estrella — Cuervo hasta el cajón</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .fondo {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at top, #1a003a 0%, #0a0a1a 60%);
      z-index: 0;
    }

    .banda {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: linear-gradient(90deg, #c00 50%, #00008b 50%);
      z-index: 10;
    }

    .banda-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 8px;
      background: linear-gradient(90deg, #00008b 50%, #c00 50%);
      z-index: 10;
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 4rem;
      border: 1px solid rgba(192, 0, 0, 0.3);
      border-radius: 1.5rem;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      max-width: 500px;
    }

    .escudo {
      font-size: 5rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #c00, #00008b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .rol {
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 1.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .frase {
      font-size: 1.3rem;
      font-style: italic;
      color: #fff;
      border-left: 4px solid #c00;
      padding-left: 1rem;
      text-align: left;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, #c00, #00008b);
      color: #fff;
      padding: 0.4rem 1.2rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .volver {
      margin-top: 2rem;
      display: inline-block;
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .volver:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="fondo"></div>
  <div class="banda"></div>
  <div class="banda-bottom"></div>

  <div class="card">
    <div class="escudo">🦅</div>
    <h1>Alumno Estrella</h1>
    <div class="rol">Marketer</div>
    <div class="frase">"Cuervo hasta el cajón."</div>
    <span class="badge">⚽ San Lorenzo de Almagro</span>
    <br>
    <a href="/" class="volver">← Volver al taller</a>
  </div>
</body>
</html>
